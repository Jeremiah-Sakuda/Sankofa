# Sankofa CI — Lint and build on push/PR to main
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Cloud Run
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy Backend
        id: deploy-backend
        run: |
          gcloud run deploy sankofa-api \
            --source ./backend \
            --region us-central1 \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --allow-unauthenticated \
            --quiet \
            --set-env-vars "ENVIRONMENT=production,GOOGLE_CLOUD_PROJECT=${{ secrets.GCP_PROJECT_ID }},GOOGLE_CLOUD_LOCATION=us-central1,GOOGLE_GENAI_USE_VERTEXAI=True,USE_FIRESTORE=True" \
            --min-instances 1 \
            --max-instances 5 \
            --memory 1Gi \
            --timeout 300
          
          echo "url=$(gcloud run services describe sankofa-api --region us-central1 --project ${{ secrets.GCP_PROJECT_ID }} --format 'value(status.url)')" >> $GITHUB_OUTPUT

      - name: Deploy Frontend
        id: deploy-frontend
        run: |
          gcloud run deploy sankofa-frontend \
            --source ./frontend \
            --region us-central1 \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --allow-unauthenticated \
            --quiet \
            --set-env-vars "NEXT_PUBLIC_API_URL=${{ steps.deploy-backend.outputs.url }}" \
            --set-build-env-vars "NEXT_PUBLIC_API_URL=${{ steps.deploy-backend.outputs.url }}" \
            --min-instances 1 \
            --max-instances 3 \
            --memory 512Mi
          
          echo "url=$(gcloud run services describe sankofa-frontend --region us-central1 --project ${{ secrets.GCP_PROJECT_ID }} --format 'value(status.url)')" >> $GITHUB_OUTPUT

      - name: Update Backend CORS
        run: |
          gcloud run services update sankofa-api \
            --region us-central1 \
            --project ${{ secrets.GCP_PROJECT_ID }} \
            --update-env-vars "FRONTEND_URL=${{ steps.deploy-frontend.outputs.url }}"
