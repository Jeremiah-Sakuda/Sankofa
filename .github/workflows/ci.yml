# Sankofa CI — Lint and build on push/PR to main
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          cd backend
          python -m venv .venv
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install ruff

      - name: Lint (ruff)
        run: |
          cd backend
          .venv/bin/ruff check app --output-format=github

      - name: Verify app starts
        run: |
          cd backend
          .venv/bin/python -c "from app.main import app; print('OK')"
        env:
          GOOGLE_API_KEY: placeholder-for-ci
          ENVIRONMENT: development

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build
        run: |
          cd frontend
          npm run build
        env:
          NEXT_PUBLIC_API_URL: https://api.example.com
